<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Runner Rush</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Russo+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css?v=d7bda2a" />
  </head>
  <body>
    <main class="game-shell">
      <div class="canvas-wrap">
        <div class="score-panel">
          <header class="hud">
            <div class="hud-title">
              <h1>Runner Rush</h1>
              <p class="subtitle">Arcade endless runner</p>
            </div>
            <div class="stats">
              <span id="score">Score: 0</span>
              <span id="coins-run">Run Coins: 0</span>
              <span id="best-score">Best: 0</span>
              <span id="bank-coins">Bank: 0</span>
            </div>
          </header>
          <section class="meta-panel">
            <span id="level">Level: 1</span>
            <span id="mission">Mission: Collect 20 coins (0/20)</span>
          </section>
        </div>
        <div class="canvas-stage">
          <canvas id="game-canvas" width="960" height="540"></canvas>
          <button id="fullscreen-btn" type="button" aria-label="Enter fullscreen"></button>
        </div>
      </div>

      <section class="controls">
        <button id="jump-btn" type="button">Jump</button>
        <button id="slide-btn" type="button">Slide</button>
        <button id="restart-btn" type="button" disabled>Restart</button>
        <button id="restart-stage-zero-btn" type="button">Restart from Stage 0</button>
        <button id="reset-everything-btn" type="button">Reset Everything</button>
        <button id="revive-btn" type="button" disabled>Revive (50)</button>
        <button id="start-btn" type="button">Start Run</button>
        <button id="endless-btn" type="button" hidden>Endless Mode</button>
        <button id="music-toggle-btn" type="button">Music: On</button>
      </section>

      <section class="shop">
        <h2>Upgrades</h2>
        <div class="shop-actions">
          <button id="upgrade-jump-btn" type="button">Upgrade Jump (120)</button>
          <button id="upgrade-magnet-btn" type="button">Upgrade Coin Magnet (120)</button>
        </div>
      </section>

      <p class="instructions">Controls: Space=Jump, ArrowDown=Slide, tap upper canvas=jump, lower canvas=slide, R=Restart.</p>
    </main>

    <audio id="bg-music" src="./assets/music/bg-loop.wav?v=d7bda2a" loop preload="auto"></audio>
    <script src="./game.js?v=d7bda2a"></script>
  </body>
</html>
