<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Runner Rush" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Arcade endless runner with stages, upgrades, and boss fights." />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Runner Rush</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Russo+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css?v=hud-icons" />
  </head>
  <body>
    <main class="game-shell">
      <div class="canvas-wrap">
        <div class="score-panel">
          <header class="hud">
            <div class="hud-title">
              <h1>Runner Rush</h1>
            </div>
            <ul class="stats">
              <li class="hud-stat hud-stat-score" title="Score">
                <svg class="hud-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
                  <path d="M13 2 3 14h8l-1 8 10-12h-8l1-8z" />
                </svg>
                <span id="score">0</span>
              </li>
              <li class="hud-stat hud-stat-coins" title="Run coins">
                <svg class="hud-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
                  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.39-2.1 1.39-1.6 0-2.23-.72-2.32-1.64H8.04c.1 1.7 1.36 2.66 2.86 2.97V19h2.34v-1.67c1.52-.29 2.72-1.16 2.73-2.77-.01-2.2-1.9-2.96-3.66-3.42z" />
                </svg>
                <span id="coins-run">0</span>
              </li>
              <li class="hud-stat hud-stat-best" title="Best score">
                <svg class="hud-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
                  <path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.006 5.006 0 0 0 11 16.9V19H8v2h8v-2h-3v-2.1a5.006 5.006 0 0 0 3.61-3.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zm-1 3c0 1.66-1.34 3-3 3s-3-1.34-3-3V7h6v1z" />
                </svg>
                <span id="best-score">0</span>
              </li>
              <li class="hud-stat hud-stat-bank" title="Bank">
                <svg class="hud-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
                  <path d="M4 10v7h3v-7H4zm6 0v7h3v-7h-3zM2 22h19v-3H2v3zm14-12v7h3v-7h-3zm-7-5-7 4v2h20v-2l-7-4-3 2-3-2z" />
                </svg>
                <span id="bank-coins">0</span>
              </li>
            </ul>
          </header>
          <section class="meta-panel">
            <span class="hud-meta-item" title="Stage">
              <svg class="hud-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
                <path d="M14 6l-3.75 5 2.75 3.5-1.6 1.2L7 11l3-4h4zm-4 12H5v-2h5v2zm7 0h-5v-2h5v2zM5 8V6h14v2H5z" />
              </svg>
              <span id="level">1/40</span>
            </span>
            <span class="hud-meta-item hud-meta-goal" title="Goal">
              <svg class="hud-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="12" cy="12" r="9" />
                <circle cx="12" cy="12" r="4" />
                <circle cx="12" cy="12" r="1" fill="currentColor" stroke="none" />
              </svg>
              <span id="mission">Sunny Trail · 0/90</span>
            </span>
            <span class="hud-meta-item hud-meta-speed" title="Run speed">
              <svg class="hud-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="12" cy="13" r="8" />
                <path d="M12 13 16 9" stroke-linecap="round" />
                <path d="M12 5V3" stroke-linecap="round" />
                <path d="M5.5 8.5 4 7" stroke-linecap="round" />
                <path d="M3 13H1" stroke-linecap="round" />
              </svg>
              <span id="run-speed">0.0</span>
            </span>
          </section>
        </div>
        <div class="canvas-stage">
          <canvas id="game-canvas" width="960" height="540" draggable="false"></canvas>
          <button id="menu-toggle-btn" type="button" class="canvas-float-btn" aria-label="Open menu" aria-expanded="false" aria-controls="game-menu">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
              <path d="M4 7h16v2H4V7zm0 5h16v2H4v-2zm0 5h16v2H4v-2z" />
            </svg>
          </button>
          <button id="fullscreen-btn" type="button" class="canvas-float-btn canvas-float-btn-right" aria-label="Enter fullscreen"></button>
        </div>
      </div>
    </main>

    <div id="menu-backdrop" class="menu-backdrop" hidden></div>
    <aside id="game-menu" class="game-menu" aria-hidden="true" aria-label="Game menu">
      <div class="game-menu-orient">
        <header class="game-menu-header">
          <h2 class="game-menu-title">Menu</h2>
          <button id="menu-close-btn" type="button" class="menu-close-btn" aria-label="Close menu">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
              <path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.29 19.71 2.88 18.3 9.17 12 2.88 5.71 4.29 4.3 10.59 10.6l6.29-6.3z" />
            </svg>
          </button>
        </header>

        <div class="game-menu-scroll">
          <nav class="game-menu-nav">
        <button id="endless-btn" type="button" class="menu-item menu-item-endless" hidden>
          <svg class="menu-item-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M18.178 8c5.096 0 5.096 8 0 8M5.822 8c-5.096 0-5.096 8 0 8" />
          </svg>
          <span class="menu-item-label">Endless mode</span>
        </button>
        <button id="campaign-btn" type="button" class="menu-item menu-item-campaign" hidden>
          <svg class="menu-item-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path d="M14 6l-3.75 5 2.75 3.5-1.6 1.2L7 11l3-4h4zm-4 12H5v-2h5v2zm7 0h-5v-2h5v2zM5 8V6h14v2H5z" />
          </svg>
          <span class="menu-item-label">Campaign mode</span>
          <span id="campaign-stage-meta" class="menu-item-meta">Stage 1</span>
        </button>
        <button id="restart-btn" type="button" class="menu-item" disabled>
          <svg class="menu-item-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path d="M12 6V3L8 7l4 4V8c2.76 0 5 2.24 5 5 0 1.01-.3 1.95-.82 2.73l1.46 1.46A6.934 6.934 0 0 0 19 13c0-3.87-3.13-7-7-7zm-5 5c0-1.01.3-1.95.82-2.73L6.36 6.81A6.934 6.934 0 0 0 5 13c0 3.87 3.13 7 7 7v3l4-4-4-4v3c-2.76 0-5-2.24-5-5z" />
          </svg>
          <span id="restart-label" class="menu-item-label">Restart</span>
        </button>
        <button id="revive-btn" type="button" class="menu-item menu-item-accent" disabled>
          <svg class="menu-item-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
          </svg>
          <span class="menu-item-label">Revive</span>
          <span class="menu-item-meta">40 coins</span>
        </button>
        <button id="restart-stage-zero-btn" type="button" class="menu-item">
          <svg class="menu-item-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z" />
          </svg>
          <span class="menu-item-label">Restart from Stage 1</span>
        </button>
        <button id="music-toggle-btn" type="button" class="menu-item">
          <svg class="menu-item-icon menu-icon-music-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path d="M3 10v4c0 1.66 2.69 3 6 3s6-1.34 6-3v-4c0 1.66-2.69 3-6 3s-6-1.34-6-3zm6-8-6 2v6.5c0 2.48 3.13 4.5 7 4.5s7-2.02 7-4.5V4l-7-2z" />
          </svg>
          <svg class="menu-item-icon menu-icon-music-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true" hidden>
            <path d="M3.63 3.63a.996.996 0 0 0 0 1.41L7.29 8.7 3 10v4c0 1.66 2.69 3 6 3 .56 0 1.1-.06 1.62-.17l2.03 2.03c-.79.21-1.63.34-2.5.34-3.87 0-7-2.02-7-4.5V4l1.63-.65 2.52 2.52V4l7 2v3.29l2 2V4l-7-2-1.37.55 1.41 1.41L3.63 3.63zM16.5 12c0 .83-.67 1.5-1.5 1.5v2.21c2.01-.49 3.5-1.88 3.5-3.71v-1.1l-2 2v1.1zm-2-9.21v3.29l6.06 6.06 1.41-1.41L14.91 2.79z" />
          </svg>
          <span id="music-toggle-label" class="menu-item-label">Music on</span>
        </button>
        <button id="reset-everything-btn" type="button" class="menu-item menu-item-danger">
          <svg class="menu-item-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
          </svg>
          <span class="menu-item-label">Reset all progress</span>
        </button>
        <button id="exit-app-btn" type="button" class="menu-item menu-item-exit" hidden>
          <svg class="menu-item-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path d="M10.09 15.59 11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z" />
          </svg>
          <span class="menu-item-label">Exit app</span>
        </button>
      </nav>

      <section class="game-menu-shop">
        <h3 class="game-menu-section-title">Upgrades</h3>
        <button id="upgrade-jump-btn" type="button" class="menu-item">
          <svg class="menu-item-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path d="M7.41 15.41 12 10.83l4.59 4.58L18 14l-6-6-6 6 1.41 1.41z" />
          </svg>
          <span class="menu-item-label">Jump height</span>
          <span id="upgrade-jump-meta" class="menu-item-meta">120</span>
        </button>
        <button id="upgrade-magnet-btn" type="button" class="menu-item">
          <svg class="menu-item-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path d="M15 2h-2v2h-2V2H9v2H7V2H5v4H3v10c0 2.21 1.79 4 4 4h10c2.21 0 4-1.79 4-4V6h-2V2h-2zM5 16V8h14v8c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2z" />
          </svg>
          <span class="menu-item-label">Coin magnet</span>
          <span id="upgrade-magnet-meta" class="menu-item-meta">120</span>
        </button>
      </section>

          <p class="game-menu-hint">Tap top to jump/swim up, bottom to slide/dive · Fire worlds: jump/slide to dodge lava surges</p>
        </div>
      </div>
    </aside>

    <aside id="exit-app-overlay" class="exit-app-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="exit-app-title" hidden>
      <div class="exit-app-card">
        <h2 id="exit-app-title" class="exit-app-title">Close Runner Rush</h2>
        <p id="exit-app-message" class="exit-app-message"></p>
        <button id="exit-app-dismiss-btn" type="button" class="exit-app-dismiss-btn">Keep playing</button>
      </div>
    </aside>

    <aside id="install-banner" class="install-banner hidden" aria-live="polite">
      <p id="install-banner-text">Install Runner Rush on your home screen.</p>
      <ol id="install-steps" class="install-steps hidden"></ol>
      <div class="install-banner-actions">
        <button id="install-app-btn" type="button" class="hidden">Install App</button>
        <button id="install-help-btn" type="button">How to install</button>
        <button id="install-dismiss-btn" type="button">Not now</button>
      </div>
    </aside>

    <audio id="bg-music" src="./assets/music/bg-loop.wav?v=ecaed7e" loop preload="auto" playsinline></audio>
    <script src="./pwa.js?v=ecaed7e"></script>
    <script src="./game.js?v=hud-speed"></script>
  </body>
</html>
